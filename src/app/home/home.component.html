<section id="home" class="hero" aria-label="Home">

  <!-- Video background -->
  <video #bgVideo class="bg-video" autoplay muted playsinline loop (ended)="onVideoEnded()">
    <source [src]="currentVideoSrc" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>
  <div class="bg-scanlines"></div>

  <!-- Corner decorations -->
  <div class="corner-deco corner-tl" aria-hidden="true"><span></span><span></span></div>
  <div class="corner-deco corner-br" aria-hidden="true"><span></span><span></span></div>

  <div class="hero-inner">

    <div class="hero-content">

      <!-- Handle with blinking red dot (stops after intro) -->
      <div class="handle-badge" aria-label="Username DerZiad">
        <span class="handle-dot" [class.blinking]="!introComplete" aria-hidden="true"></span>
        <span class="handle-text">DerZiad</span>
      </div>

      <!-- Employment status -->
      <div class="status-badge" aria-label="Currently working at Capgemini">
        <span class="status-icon" aria-hidden="true"></span>
        Working at Capgemini
      </div>

      <h1 class="headline">
        Hello,<br>I'm <span class="name-neon">Ziad Bougrine</span>
      </h1>

      <p class="subheadline">Full&#8209;stack developer building fast, accessible web experiences</p>

      <p class="role">
        <span class="role-prefix">I am a</span>
        <span class="hacker-color" aria-live="polite" role="status">{{animatedText}}</span><span class="caret hacker-color" aria-hidden="true">{{cursor}}</span>
      </p>

      <div class="actions" role="group" aria-label="Primary actions">
        <a class="btn btn-primary" href="mailto:ziadbougrine@gmail.com" aria-label="Contact Ziad">Contact</a>
        <a class="btn btn-secondary" routerLink="/resume" aria-label="View resume">View Resume</a>
      </div>

      <!-- Scroll indicator appears after intro completes -->
      <div class="scroll-indicator" [class.visible]="introComplete" aria-hidden="true">
        <span class="arrow">↓</span>
      </div>

    </div>

  </div>
</section>
